<!DOCTYPE html>
<html>
<head>
    <title>Reset Your Password</title>
    <script src="https://download.playfab.com/PlayFabClientApi.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin: 10px 0; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #2ea44f; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Reset Password</h3>
        <input type="password" id="newPassword" placeholder="Enter new password" />
        <button onclick="resetPassword()">Submit</button>
        <p id="message"></p>
    </div>

    <script>
        function resetPassword() {
            // 1. Get the token from the URL (PlayFab adds this automatically)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('newPassword').value;

            // 2. Setup the PlayFab Title ID (REPLACE THIS WITH YOURS)
            PlayFab.settings.titleId = "15CB9A"; 

            const request = {
                Token: token,
                Password: newPassword
            };

            // 3. Call the PlayFab API
            PlayFabClientSDK.ResetPassword(request, (result, error) => {
                if (result) {
                    document.getElementById('message').innerText = "Password reset successfully!";
                    document.getElementById('message').style.color = "green";
                } else {
                    document.getElementById('message').innerText = "Error: " + error.errorMessage;
                    document.getElementById('message').style.color = "red";
                }
            });
        }
    </script>
</body>
</html>
